<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Гральні карти</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin: 0;
      background: #f2f2f2;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 40px;
    }

    p{
      margin: 0;
    }

    .label{
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 16px;
      margin-top: 40px;
    }

    .label:first-child{
      margin-top: 0;
    }

    .row{
      margin-bottom: 8px;
    }

    .card{
      display: inline-block;
      background: #d9d9d9;
      border-radius: 6px;
      width: 64px;
      height: 64px;
      line-height: 64px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-right: 12px;
    }

    .red{
      color: #9c1c1c;
    }
  </style>
</head>
<body>

<p class="label">Player 1:</p>
<p class="row">
  <span class="card">2♣</span>
  <span class="card red">9♥</span>
  <span class="card red">6♥</span>
  <span class="card red">A♦</span>
  <span class="card">Q♠</span>
  <span class="card">J♣</span>
</p>

<p class="label">Player 2:</p>
<p class="row">
  <span class="card red">3♥</span>
  <span class="card">A♣</span>
  <span class="card">10♣</span>
  <span class="card red">K♦</span>
  <span class="card">8♠</span>
  <span class="card red">3♥</span>
</p>

</body>
</html>
